<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADU - Validador de Pagamento</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --main-blue: #1a2b5c; --bg-gray: #f5f6f8; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { width: 100%; max-width: 400px; height: 90vh; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .bot { background-color: var(--bg-gray); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background-color: var(--main-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .controls { padding: 20px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 12px; background: var(--main-blue); color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-area" id="chatArea">
        <div class="bubble bot">Olá! Sou a Assistente Virtual do CADU. Vou te auxiliar na validação do seu pagamento.</div>
        <div class="bubble bot">Para começar, preciso que você envie o **comprovante de pagamento**.</div>
    </div>
    
    <div class="controls">
        <input type="file" id="fileInput" class="hidden" accept="image/*,application/pdf" onchange="handleFile(this.files[0])">
        <button onclick="document.getElementById('fileInput').click()">📁 Enviar Arquivo / Foto</button>
        <button id="manualBtn" class="hidden" onclick="askManualInput()">Digitar manualmente</button>
    </div>
</div>

<script>
    let state = 'RECEIPT'; // RECEIPT or BILL
    let receiptData = "";

    async function handleFile(file) {
        addMessage(file.name, 'user');
        addMessage("Processando documento...", 'bot');

        try {
            let text = "";
            if (file.type === 'application/pdf') {
                const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
                const page = await pdf.getPage(1);
                const content = await page.getTextContent();
                text = content.items.map(i => i.str).join(' ');
            } else {
                const worker = await Tesseract.createWorker('por');
                const ret = await worker.recognize(file);
                text = ret.data.text;
                await worker.terminate();
            }

            processResult(text);
        } catch (e) {
            addMessage("Erro ao ler o arquivo. Tente novamente com uma foto mais nítida.", 'bot');
        }
    }

    function processResult(text) {
        const numbers = text.replace(/\D/g, '');
        if (state === 'RECEIPT') {
            receiptData = numbers.substring(0, 20); // Simulação de extração
            addMessage("Comprovante lido com sucesso! Identifiquei o registro: " + receiptData, 'bot');
            addMessage("Agora, por favor, envie o **Código de Barras ou Linha Digitável** da conta que deseja validar.", 'bot');
            state = 'BILL';
        } else {
            const billData = numbers.substring(0, 20);
            if (billData.includes(receiptData.substring(0, 10))) {
                addMessage("✅ Pagamento Validado! Os dados coincidem.", 'bot');
            } else {
                addMessage("❌ Divergência encontrada! Os dados não conferem.", 'bot');
            }
        }
    }

    function addMessage(text, sender) {
        const chat = document.getElementById('chatArea');
        chat.innerHTML += `<div class="bubble ${sender}">${text}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
