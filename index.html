<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CADU - Validador (Modo Estável)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .debug-box { background: #eee; padding: 10px; font-family: monospace; font-size: 12px; margin: 10px 0; border-radius: 5px; word-break: break-all; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1a2b5c; color: white; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Validador CADU</h3>
    <input type="text" id="referencia" placeholder="Linha digitável esperada" style="width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px;">
    <input type="file" id="fileInput" accept="application/pdf,image/*">
    <div id="debug" class="debug-box">O que o sistema leu aparecerá aqui...</div>
    <button onclick="processar()">Validar Agora</button>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function processar() {
        const file = document.getElementById('fileInput').files[0];
        const ref = document.getElementById('referencia').value.replace(/\D/g, '');
        const debug = document.getElementById('debug');
        
        if (!file || !ref) return alert("Selecione um arquivo e informe a referência.");
        
        debug.innerText = "Lendo arquivo...";
        
        try {
            let texto = "";
            if (file.type === 'application/pdf') {
                const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
                const page = await pdf.getPage(1);
                const content = await page.getTextContent();
                texto = content.items.map(i => i.str).join(' ');
            } else {
                debug.innerText = "Atenção: A leitura de imagem está desativada para garantir estabilidade no Safari.";
                return;
            }

            const lido = texto.replace(/\D/g, '');
            debug.innerText = "LEITURA: " + lido;

            if (lido.includes(ref.substring(0, 10))) {
                alert("✅ VÁLIDO! Os dados conferem.");
            } else {
                alert("❌ DIVERGÊNCIA. Os dados não batem.");
            }
        } catch (e) {
            debug.innerText = "ERRO: " + e.message;
        }
    }
</script>
</body>
</html>
