<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADU - Validador Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        let ocrWorker = null;
        async function getOCRWorker() {
            if (!ocrWorker) ocrWorker = await Tesseract.createWorker('por');
            return ocrWorker;
        }
    </script>
    <style>
        :root { --main-blue: #1a2b5c; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; background: var(--main-blue); color: white; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .log { margin-top: 15px; padding: 10px; border-radius: 8px; background: #f9f9f9; font-size: 14px; }
    </style>
</head>
<body>

<div class="app">
    <div id="stepArea">
        <h3 id="title">1. Informar Conta</h3>
        <p id="desc">Escolha como fornecer os dados da conta:</p>
        
        <div id="inputOptions">
            <input type="text" id="manualInput" placeholder="Digitar linha digitável" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
            <button class="btn" onclick="processarManual()">Usar Linha Digitável</button>
            
            <p style="text-align: center; margin: 15px 0;">OU</p>
            
            <button class="btn" onclick="document.getElementById('fileInput').click()">📸 Tirar Foto / Carregar</button>
            <input type="file" id="fileInput" class="hidden" accept="image/*,application/pdf" capture="environment" onchange="processarArquivo(this)">
        </div>
    </div>
    
    <div id="resultArea" class="log hidden"></div>
    <button id="resetBtn" class="btn hidden" onclick="resetApp()">Validar outro comprovante</button>
</div>

<script>
    let referencia = "";
    let etapa = 1; // 1 = conta, 2 = comprovante

    function apenasNumeros(t) { return t.replace(/\D/g, ''); }

    async function processarManual() {
        const val = apenasNumeros(document.getElementById('manualInput').value);
        if (val.length < 10) return alert("Linha muito curta!");
        definirReferencia(val);
    }

    async function processarArquivo(input) {
        if (!input.files[0]) return;
        const file = input.files[0];
        const status = document.getElementById('resultArea');
        status.classList.remove('hidden');
        status.innerText = "Lendo arquivo...";

        try {
            let texto = "";
            if (file.type === 'application/pdf') {
                const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
                const page = await pdf.getPage(1);
                const content = await page.getTextContent();
                texto = content.items.map(i => i.str).join(' ');
            } else {
                const worker = await getOCRWorker();
                const ret = await worker.recognize(file);
                texto = ret.data.text;
            }
            
            if (etapa === 1) definirReferencia(apenasNumeros(texto));
            else validarFinal(apenasNumeros(texto));
            
        } catch (e) {
            status.innerText = "Erro ao ler arquivo: " + e.message;
        }
    }

    function definirReferencia(val) {
        referencia = val;
        etapa = 2;
        document.getElementById('title').innerText = "2. Informar Comprovante";
        document.getElementById('desc').innerText = "Agora envie a foto ou PDF do comprovante:";
        document.getElementById('resultArea').innerText = "Conta salva com sucesso!";
    }

    function validarFinal(comprovante) {
        const status = document.getElementById('resultArea');
        const match = comprovante.includes(referencia.substring(0, 10)); // Validação robusta
        
        if (match) {
            status.innerHTML = "<b style='color:green'>✅ VÁLIDO!</b><br>Os dados coincidem.";
        } else {
            status.innerHTML = "<b style='color:red'>❌ DIVERGÊNCIA!</b><br>Os números não batem.";
        }
        document.getElementById('resetBtn').classList.remove('hidden');
        document.getElementById('inputOptions').classList.add('hidden');
    }

    function resetApp() {
        etapa = 1;
        referencia = "";
        document.getElementById('title').innerText = "1. Informar Conta";
        document.getElementById('desc').innerText = "Escolha como fornecer os dados da conta:";
        document.getElementById('inputOptions').classList.remove('hidden');
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('resetBtn').classList.add('hidden');
    }
</script>

</body>
</html>
