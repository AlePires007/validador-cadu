<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADU - Validador de Religação</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-color: #f5f6f8;
            --bot-bubble: #f0f0f0;
            --user-bubble: #1a2b5c;
            --border-blue: #1a2b5c;
            --text-dark: #222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mockup do Celular */
        .phone-mockup {
            width: 100%;
            max-width: 400px;
            height: 800px;
            max-height: 95vh;
            background-color: var(--bg-color);
            border: 14px solid #333;
            border-radius: 36px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Área do Chat */
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .hoje-badge {
            background-color: #e4e4e4;
            color: #555;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            align-self: center;
            margin-bottom: 20px;
        }

        /* Balões de Mensagem */
        .message {
            margin-bottom: 16px;
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in-out;
            word-wrap: break-word;
        }

        .bot {
            background-color: var(--bot-bubble);
            color: var(--text-dark);
            align-self: flex-start;
            border-top-left-radius: 4px;
        }

        .user {
            background-color: var(--user-bubble);
            color: white;
            align-self: flex-end;
            border-top-right-radius: 4px;
        }

        /* Área de Input Fixa no Rodapé */
        .input-area {
            background-color: white;
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Estilo dos Botões/Inputs igual à imagem (Pílulas) */
        .cadu-input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border-blue);
            border-radius: 30px;
            font-size: 15px;
            color: var(--border-blue);
            background-color: transparent;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        .cadu-input::placeholder {
            color: #8892b0;
        }

        .cadu-btn {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border-blue);
            border-radius: 30px;
            font-size: 15px;
            color: var(--border-blue);
            background-color: transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .cadu-btn:hover, .cadu-btn.active {
            background-color: var(--border-blue);
            color: white;
        }

        .hidden {
            display: none !important;
        }

        /* Upload File Invisível sobre o label */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
        }
        
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Destaques de Resultado */
        .success-text { color: #28a745; font-weight: bold; }
        .error-text { color: #dc3545; font-weight: bold; }
        .ocr-debug {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            background: #e9e9e9;
            padding: 8px;
            border-radius: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Dots */
        .typing-indicator {
            display: inline-block;
            width: 40px;
        }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #888;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="phone-mockup">
        <div class="chat-container" id="chatContainer">
            <div class="hoje-badge">Hoje</div>
            
            <div class="message bot">
                Olá! Sou a sua Assistente Virtual do CADU. Vi que você precisa solicitar a religação de água.
            </div>
            
            <div class="message bot">
                Para liberar a sua Ordem de Serviço, preciso validar o pagamento da conta em aberto. Por favor, <strong>digite a linha digitável</strong> da conta.
            </div>
            </div>

        <div class="input-area" id="inputArea">
            <div id="step1">
                <input type="text" id="linhaDigitavelInput" class="cadu-input" placeholder="Digite os números da conta..." autocomplete="off">
                <button class="cadu-btn" style="margin-top: 10px;" onclick="enviarLinhaDigitavel()">Enviar Linha Digitável</button>
            </div>

            <div id="step2" class="hidden">
                <div class="file-upload-wrapper">
                    <button class="cadu-btn active">📸 Enviar Foto do Comprovante</button>
                    <input type="file" id="comprovanteInput" accept="image/*" onchange="processarComprovante()">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variáveis de Estado
        let linhaSistema = "";
        const chatContainer = document.getElementById("chatContainer");

        // Função auxiliar para rolar o chat para o fim
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Adiciona mensagem do Robô
        function addBotMessage(htmlContent) {
            const msg = document.createElement("div");
            msg.className = "message bot";
            msg.innerHTML = htmlContent;
            chatContainer.appendChild(msg);
            scrollToBottom();
            return msg;
        }

        // Adiciona mensagem do Usuário
        function addUserMessage(text) {
            const msg = document.createElement("div");
            msg.className = "message user";
            msg.textContent = text;
            chatContainer.appendChild(msg);
            scrollToBottom();
        }

        // Extrai apenas números de uma string
        function apenasNumeros(texto) {
            return texto.replace(/\D/g, '');
        }

        // --- FLUXO DO CHAT ---

        // Passo 1: Usuário envia a linha digitável
        function enviarLinhaDigitavel() {
            const input = document.getElementById("linhaDigitavelInput");
            const valor = input.value.trim();

            if (!valor) {
                alert("Por favor, informe a linha digitável.");
                return;
            }

            linhaSistema = apenasNumeros(valor);
            
            // UI Update
            addUserMessage(valor);
            document.getElementById("step1").classList.add("hidden");
            
            setTimeout(() => {
                addBotMessage("Perfeito! Agora, clique no botão abaixo para anexar a <strong>foto ou print do comprovante</strong> de pagamento gerado pelo seu banco.");
                document.getElementById("step2").classList.remove("hidden");
            }, 600);
        }

        // Passo 2: Usuário envia a imagem e o Tesseract processa
        async function processarComprovante() {
            const fileInput = document.getElementById("comprovanteInput");
            if (!fileInput.files || fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            
            // UI Update
            addUserMessage("📄 Comprovante Enviado");
            document.getElementById("step2").classList.add("hidden");

            const loadingMsg = addBotMessage('<div class="typing-indicator"><span></span><span></span><span></span></div> Analisando imagem com Inteligência Artificial...');

            try {
                // Inicia OCR (Tesseract.js)
                const worker = await Tesseract.createWorker('por');
                const ret = await worker.recognize(file);
                const textoExtraido = ret.data.text;
                await worker.terminate();

                const ocrNumeros = apenasNumeros(textoExtraido);
                
                // Validação: Checa se a linha do sistema está contida no comprovante
                const isValid = ocrNumeros.includes(linhaSistema);

                chatContainer.removeChild(loadingMsg); // Remove o loading

                if (isValid) {
                    addBotMessage(`
                        <span class="success-text">✅ Pagamento Validado!</span><br><br>
                        Localizamos a linha digitável no seu comprovante. A sua Ordem de Serviço para religação foi liberada e entrará na rota das próximas 24 horas.<br>
                        <div class="ocr-debug">Linha reconhecida com sucesso.</div>
                    `);
                } else {
                    addBotMessage(`
                        <span class="error-text">❌ Divergência Encontrada</span><br><br>
                        A linha digitável do comprovante enviado não bate com a conta que está em aberto no sistema.<br>
                        A sua solicitação foi encaminhada para análise humana.
                        <div class="ocr-debug">Números lidos pela IA:<br>${ocrNumeros.substring(0, 50)}...</div>
                    `);
                }

            } catch (error) {
                console.error(error);
                chatContainer.removeChild(loadingMsg);
                addBotMessage("⚠️ Poxa, ocorreu um erro ao ler a imagem. Ela pode estar muito embaçada. Por favor, tente enviar novamente com uma resolução melhor.");
                document.getElementById("step2").classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
