<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADU - Validador de Religação</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>

    <style>
        :root {
            --bg-color: #f5f6f8;
            --bot-bubble: #f0f0f0;
            --user-bubble: #1a2b5c;
            --border-blue: #1a2b5c;
            --text-dark: #222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-mockup {
            width: 100%;
            max-width: 400px;
            height: 800px;
            max-height: 95vh;
            background-color: var(--bg-color);
            border: 14px solid #333;
            border-radius: 36px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .hoje-badge {
            background-color: #e4e4e4;
            color: #555;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            align-self: center;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 16px;
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in-out;
            word-wrap: break-word;
        }

        .bot {
            background-color: var(--bot-bubble);
            color: var(--text-dark);
            align-self: flex-start;
            border-top-left-radius: 4px;
        }

        .user {
            background-color: var(--user-bubble);
            color: white;
            align-self: flex-end;
            border-top-right-radius: 4px;
        }

        .input-area {
            background-color: white;
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cadu-input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border-blue);
            border-radius: 30px;
            font-size: 15px;
            color: var(--border-blue);
            background-color: transparent;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        .cadu-btn {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border-blue);
            border-radius: 30px;
            font-size: 15px;
            color: var(--border-blue);
            background-color: transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .cadu-btn:hover, .cadu-btn.active {
            background-color: var(--border-blue);
            color: white;
        }

        .hidden { display: none !important; }

        .file-upload-wrapper {
            position: relative;
            width: 100%;
        }
        
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .success-text { color: #28a745; font-weight: bold; }
        .error-text { color: #dc3545; font-weight: bold; }
        .ocr-debug {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            background: #e9e9e9;
            padding: 8px;
            border-radius: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator { display: inline-block; width: 40px; }
        .typing-indicator span {
            display: inline-block; width: 6px; height: 6px; background-color: #888;
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="phone-mockup">
        <div class="chat-container" id="chatContainer">
            <div class="hoje-badge">Hoje</div>
            <div class="message bot">Olá! Sou a sua Assistente Virtual do CADU. Vi que você precisa solicitar a religação de água.</div>
            <div class="message bot">Por favor, <strong>digite a linha digitável</strong> da conta.</div>
        </div>

        <div class="input-area" id="inputArea">
            <div id="step1">
                <input type="text" id="linhaDigitavelInput" class="cadu-input" placeholder="Ex: 82610000000..." autocomplete="off">
                <button class="cadu-btn" style="margin-top: 10px;" onclick="enviarLinhaDigitavel()">Enviar Linha</button>
            </div>

            <div id="step2" class="hidden">
                <div class="file-upload-wrapper">
                    <button class="cadu-btn active">📸 Enviar Arquivo (PDF/Foto)</button>
                    <input type="file" id="comprovanteInput" accept="image/*,application/pdf" onchange="processarArquivo()">
                </div>
            </div>
        </div>
    </div>

    <script>
        let linhaSistemaLimpa = "";
        const chatContainer = document.getElementById("chatContainer");

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

        function addBotMessage(htmlContent) {
            const msg = document.createElement("div");
            msg.className = "message bot";
            msg.innerHTML = htmlContent;
            chatContainer.appendChild(msg);
            scrollToBottom();
            return msg;
        }

        function addUserMessage(text) {
            const msg = document.createElement("div");
            msg.className = "message user";
            msg.textContent = text;
            chatContainer.appendChild(msg);
            scrollToBottom();
        }

        function apenasNumeros(texto) { return texto ? texto.replace(/\D/g, '') : ''; }

        function enviarLinhaDigitavel() {
            const input = document.getElementById("linhaDigitavelInput");
            const valor = input.value.trim();
            if (!valor) return alert("Por favor, informe a linha digitável.");

            linhaSistemaLimpa = apenasNumeros(valor);
            addUserMessage(valor);
            document.getElementById("step1").classList.add("hidden");
            
            setTimeout(() => {
                addBotMessage("Perfeito! Agora, anexe o <strong>PDF ou a Foto</strong> do comprovante de pagamento gerado pelo seu banco.");
                document.getElementById("step2").classList.remove("hidden");
            }, 600);
        }

        // Lógica NATIVA para extrair texto de PDF (Evita travamentos no Mac/Safari)
        async function extrairTextoNativoPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let textoCompleto = "";
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                textoCompleto += pageText + " ";
            }
            return textoCompleto;
        }

        async function processarArquivo() {
            const fileInput = document.getElementById("comprovanteInput");
            if (!fileInput.files || fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            const isPDF = file.type === 'application/pdf';
            
            addUserMessage(`📄 Arquivo Enviado (${isPDF ? 'PDF' : 'Imagem'})`);
            document.getElementById("step2").classList.add("hidden");

            const loadingMsg = addBotMessage('<div class="typing-indicator"><span></span><span></span><span></span></div> Processando documento...');

            try {
                let textoExtraido = "";

                if (isPDF) {
                    // Extração ultrarrápida nativa
                    textoExtraido = await extrairTextoNativoPDF(file);
                } else {
                    // Se for JPG/PNG, usamos Inteligência Artificial
                    const worker = await Tesseract.createWorker('por');
                    const ret = await worker.recognize(file);
                    textoExtraido = ret.data.text;
                    await worker.terminate();
                }

                const ocrNumeros = apenasNumeros(textoExtraido);
                
                // Validação Inteligente: Procura os blocos
                const bloco1 = linhaSistemaLimpa.substring(0, 11);
                const bloco2 = linhaSistemaLimpa.substring(11, 22);

                const isValid = ocrNumeros.includes(bloco1) && ocrNumeros.includes(bloco2);

                chatContainer.removeChild(loadingMsg);

                if (isValid) {
                    addBotMessage(`
                        <span class="success-text">✅ Pagamento Validado!</span><br><br>
                        Os dados do comprovante coincidem com a conta informada. Ordem de Serviço liberada.<br>
                        <div class="ocr-debug">Método: ${isPDF ? 'Leitura Nativa' : 'Leitura por IA'}.</div>
                    `);
                } else {
                    addBotMessage(`
                        <span class="error-text">❌ Divergência Encontrada</span><br><br>
                        O comprovante enviado não possui os mesmos números da conta.
                    `);
                }

            } catch (error) {
                console.error("Erro interno:", error);
                chatContainer.removeChild(loadingMsg);
                
                // Tratamento seguro para erros do Safari (evita o "undefined")
                const msgErro = error instanceof Error ? error.message : JSON.stringify(error);
                
                addBotMessage(`⚠️ Houve uma falha no processamento. Tente fechar e abrir o navegador. Detalhe técnico: ${msgErro}`);
                document.getElementById("step2").classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
