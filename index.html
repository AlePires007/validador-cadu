<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CADU - Validador</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        // --- GERENCIADOR DE OCR ROBUSTO PARA SAFARI ---
        let ocrWorker = null;

        async function getWorker() {
            // Se o worker já existe e não foi morto pelo Safari, retorna ele
            if (ocrWorker) return ocrWorker;
            
            // Caso contrário, cria um novo
            ocrWorker = await Tesseract.createWorker('por');
            return ocrWorker;
        }
    </script>
    <style>
        body { font-family: sans-serif; background: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 20px; width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .log { margin-top: 20px; font-size: 14px; color: #555; }
        button { width: 100%; padding: 15px; background: #1a2b5c; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Validador CADU</h3>
        <input type="text" id="linhaInput" placeholder="Linha digitável" style="width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px;">
        <input type="file" id="fileInput" accept="image/*,application/pdf" style="margin-bottom: 10px;">
        <button onclick="processar()">Validar</button>
        <div id="status" class="log">Aguardando arquivo...</div>
    </div>

    <script>
        async function processar() {
            const status = document.getElementById('status');
            const file = document.getElementById('fileInput').files[0];
            const linha = document.getElementById('linhaInput').value.replace(/\D/g, '');
            
            if (!file || !linha) return alert("Preencha tudo");
            status.innerText = "Processando...";

            try {
                let texto = "";

                if (file.type === 'application/pdf') {
                    // PDF é leitura nativa (super rápido e estável no Safari)
                    const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
                    const page = await pdf.getPage(1);
                    const content = await page.getTextContent();
                    texto = content.items.map(i => i.str).join(' ');
                } else {
                    // Imagem usa o Tesseract com tratamento de erro
                    try {
                        const worker = await getWorker();
                        const ret = await worker.recognize(file);
                        texto = ret.data.text;
                    } catch (e) {
                        // Se falhou (Safari bloqueou), reseta o worker para tentar do zero depois
                        ocrWorker = null;
                        throw new Error("Erro no Safari/OCR. Tente novamente.");
                    }
                }

                if (texto.replace(/\D/g, '').includes(linha.substring(0, 10))) {
                    status.innerHTML = "<b style='color:green'>✅ Válido!</b>";
                } else {
                    status.innerHTML = "<b style='color:red'>❌ Divergência.</b>";
                }
            } catch (err) {
                status.innerHTML = "<b style='color:red'>" + err.message + "</b>";
            }
        }
    </script>
</body>
</html>
