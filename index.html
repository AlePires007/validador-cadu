<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADU - Validador de Religação</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        // Inicialização global do Tesseract para evitar erros de worker no Safari
        let ocrWorker = null;
        async function getOCRWorker() {
            if (!ocrWorker) {
                ocrWorker = await Tesseract.createWorker('por');
            }
            return ocrWorker;
        }
    </script>
    <style>
        /* (Mantenha o mesmo CSS anterior para não alterar o visual) */
        :root { --bg-color: #f5f6f8; --bot-bubble: #f0f0f0; --user-bubble: #1a2b5c; --border-blue: #1a2b5c; --text-dark: #222; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #e0e0e0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone-mockup { width: 100%; max-width: 400px; height: 800px; max-height: 95vh; background-color: var(--bg-color); border: 14px solid #333; border-radius: 36px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .hoje-badge { background-color: #e4e4e4; color: #555; font-size: 12px; font-weight: bold; padding: 4px 12px; border-radius: 12px; align-self: center; margin-bottom: 20px; }
        .message { margin-bottom: 16px; max-width: 85%; padding: 14px 18px; border-radius: 12px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .bot { background-color: var(--bot-bubble); color: var(--text-dark); align-self: flex-start; border-top-left-radius: 4px; }
        .user { background-color: var(--user-bubble); color: white; align-self: flex-end; border-top-right-radius: 4px; }
        .input-area { background-color: white; padding: 20px; border-top: 1px solid #ddd; display: flex; flex-direction: column; gap: 12px; }
        .cadu-input { width: 100%; padding: 14px; border: 1.5px solid var(--border-blue); border-radius: 30px; font-size: 15px; color: var(--border-blue); background-color: transparent; text-align: center; box-sizing: border-box; outline: none; }
        .cadu-btn { width: 100%; padding: 14px; border: 1.5px solid var(--border-blue); border-radius: 30px; font-size: 15px; color: var(--border-blue); background-color: transparent; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .cadu-btn:hover, .cadu-btn.active { background-color: var(--border-blue); color: white; }
        .hidden { display: none !important; }
        .file-upload-wrapper { position: relative; width: 100%; }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .success-text { color: #28a745; font-weight: bold; }
        .error-text { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <div class="phone-mockup">
        <div class="chat-container" id="chatContainer">
            <div class="hoje-badge">Hoje</div>
            <div class="message bot">Olá! Por favor, <strong>digite a linha digitável</strong>.</div>
        </div>
        <div class="input-area">
            <div id="step1"><input type="text" id="linhaDigitavelInput" class="cadu-input" placeholder="Ex: 82610000000...">
                <button class="cadu-btn" style="margin-top: 10px;" onclick="enviarLinhaDigitavel()">Enviar Linha</button></div>
            <div id="step2" class="hidden"><div class="file-upload-wrapper">
                <button class="cadu-btn active">📸 Enviar Comprovante</button>
                <input type="file" id="comprovanteInput" accept="image/*,application/pdf" onchange="processarArquivo()">
            </div></div>
        </div>
    </div>
    <script>
        let linhaSistemaLimpa = "";
        function apenasNumeros(t) { return t ? t.replace(/\D/g, '') : ''; }
        function enviarLinhaDigitavel() {
            linhaSistemaLimpa = apenasNumeros(document.getElementById("linhaDigitavelInput").value);
            if (!linhaSistemaLimpa) return alert("Linha inválida");
            document.getElementById("step1").classList.add("hidden");
            document.getElementById("step2").classList.remove("hidden");
            const div = document.createElement("div"); div.className = "message user"; div.textContent = linhaSistemaLimpa;
            document.getElementById("chatContainer").appendChild(div);
        }
        async function processarArquivo() {
            const file = document.getElementById("comprovanteInput").files[0];
            const isPDF = file.type === 'application/pdf';
            const loading = document.createElement("div"); loading.className = "message bot"; loading.textContent = "Processando...";
            document.getElementById("chatContainer").appendChild(loading);
            try {
                let texto = "";
                if (isPDF) {
                    const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
                    const page = await pdf.getPage(1);
                    const content = await page.getTextContent();
                    texto = content.items.map(i => i.str).join(' ');
                } else {
                    const worker = await getOCRWorker();
                    const ret = await worker.recognize(file);
                    texto = ret.data.text;
                }
                const n = apenasNumeros(texto);
                const valido = n.includes(linhaSistemaLimpa.substring(0, 11));
                loading.innerHTML = valido ? "<span class='success-text'>✅ Validado!</span>" : "<span class='error-text'>❌ Divergência.</span>";
            } catch (e) {
                loading.textContent = "Erro: Tente um arquivo mais simples ou apenas PDF.";
            }
        }
    </script>
</body>
</html>
